# =============================================================================
# SpecVLM — Prometheus Configuration
# =============================================================================

global:
  scrape_interval: 10s
  evaluation_interval: 10s
  scrape_timeout: 5s

scrape_configs:
  - job_name: "specvlm-inference"
    static_configs:
      - targets: ["specvlm:8001"]
    metrics_path: "/metrics"
    scrape_interval: 5s
    # Labels for filtering in Grafana
    metric_relabel_configs:
      - source_labels: [__name__]
        regex: "specvlm_(.*)"
        target_label: service
        replacement: "specvlm"

  - job_name: "specvlm-system"
    static_configs:
      - targets: ["node-exporter:9100"]
    scrape_interval: 15s

  - job_name: "redis"
    static_configs:
      - targets: ["redis-exporter:9121"]
    scrape_interval: 10s

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files:
  - "alerts.yml"
